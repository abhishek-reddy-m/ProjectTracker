<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Forge Studio — plan, architect & ship, end to end</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/roughjs@4.6.6/bundled/rough.js"></script>
<style>
  :root{
    --bg:#ffffff; --bg-2:#fafafa; --fg:#000000; --fg-2:#666666; --fg-3:#8f8f8f;
    --border:#eaeaea; --border-2:#d4d4d4; --hover:#f5f5f5; --accent:#0070f3;
    --shadow:0 2px 8px rgba(0,0,0,.05); --shadow-lg:0 12px 44px rgba(0,0,0,.13);
    --green:#0a8f3c; --green-bg:rgba(10,143,60,.1); --amber:#b8860b; --amber-bg:rgba(184,134,11,.12);
    --ease:cubic-bezier(.2,.7,.2,1);
    --sans:"Geist",-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif;
    --mono:"Geist Mono",ui-monospace,"SF Mono",Menlo,monospace;
  }
  html[data-theme="dark"]{
    --bg:#000000; --bg-2:#0a0a0a; --fg:#fafafa; --fg-2:#a1a1a1; --fg-3:#737373;
    --border:#262626; --border-2:#404040; --hover:#141414; --accent:#3b9eff;
    --shadow:0 2px 10px rgba(0,0,0,.5); --shadow-lg:0 14px 54px rgba(0,0,0,.6);
    --green:#3ad07e; --green-bg:rgba(48,209,88,.15); --amber:#e3b341; --amber-bg:rgba(227,179,65,.16);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--sans);font-weight:400;line-height:1.5;letter-spacing:-.011em;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;transition:background .3s var(--ease),color .3s var(--ease)}
  ::selection{background:var(--accent);color:#fff}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;color:inherit}
  textarea,input{font-family:inherit}
  .mono{font-family:var(--mono);letter-spacing:0}

  .btn{font-weight:500;font-size:14px;border:1px solid transparent;border-radius:8px;padding:9px 16px;cursor:pointer;transition:all .2s var(--ease);display:inline-flex;align-items:center;gap:8px;white-space:nowrap}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:var(--fg);color:var(--bg);border-color:var(--fg)}
  .btn-primary:hover{opacity:.85}
  .btn-out{background:var(--bg);border-color:var(--border);color:var(--fg)}
  .btn-out:hover{border-color:var(--border-2);background:var(--hover)}
  .btn-sm{padding:7px 13px;font-size:13px}
  .ic{width:34px;height:34px;border:1px solid var(--border);border-radius:7px;background:var(--bg);cursor:pointer;display:grid;place-items:center;transition:all .2s var(--ease);flex:none}
  .ic:hover{border-color:var(--border-2);background:var(--hover)}
  .ic svg{width:16px;height:16px;fill:none;stroke:var(--fg);stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}

  /* start */
  #start{min-height:100vh;display:grid;place-items:center;padding:24px}
  .start-card{width:min(480px,100%);text-align:center}
  .start-logo{display:inline-flex;align-items:center;gap:10px;font-weight:600;font-size:17px;margin-bottom:28px}
  .tri{width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;border-bottom:15px solid var(--fg)}
  .start-card h1{font-size:34px;font-weight:600;letter-spacing:-.035em;line-height:1.08}
  .start-card p{color:var(--fg-2);font-size:16px;margin:14px 0 28px}
  .start-form{text-align:left;border:1px solid var(--border);border-radius:14px;padding:24px;background:var(--bg-2)}
  .fld{margin-bottom:16px}
  .fld label{display:block;font-size:13px;font-weight:500;color:var(--fg-2);margin-bottom:8px}
  .fld input,.fld textarea{width:100%;font-size:15px;padding:12px 14px;border:1px solid var(--border);border-radius:9px;background:var(--bg);color:var(--fg);transition:all .2s var(--ease)}
  .fld textarea{resize:vertical;min-height:64px;line-height:1.5}
  .fld input:focus,.fld textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 25%,transparent)}
  .start-form .btn{width:100%;justify-content:center;padding:12px;margin-top:4px}

  /* shell */
  #app{display:none;min-height:100vh}
  .shell{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
  .sidebar{border-right:1px solid var(--border);background:var(--bg-2);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .sb-top{padding:18px 18px 14px;border-bottom:1px solid var(--border)}
  .sb-logo{display:flex;align-items:center;gap:9px;font-weight:600;font-size:14px;cursor:pointer}
  .sb-logo .tri{border-bottom-width:12px;border-left-width:7px;border-right-width:7px}
  .sb-proj{margin-top:14px}
  .sb-proj .pn{font-size:15px;font-weight:600;letter-spacing:-.015em;line-height:1.25}
  .sb-proj .po{font-size:12px;color:var(--fg-2);margin-top:4px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .sb-prog{margin-top:12px;display:flex;align-items:center;gap:9px}
  .sb-prog .barwrap{flex:1;height:5px;border-radius:99px;background:var(--border);overflow:hidden}
  .sb-prog .barwrap i{display:block;height:100%;background:var(--accent);border-radius:99px;transition:width .5s var(--ease)}
  .sb-prog .pt{font-family:var(--mono);font-size:11px;color:var(--fg-3)}
  .sb-nav{flex:1;padding:12px;overflow-y:auto}
  .navitem{width:100%;display:flex;align-items:center;gap:11px;padding:9px 12px;border:none;background:none;border-radius:8px;cursor:pointer;font-size:14px;color:var(--fg-2);transition:all .18s var(--ease);text-align:left}
  .navitem:hover{background:var(--hover);color:var(--fg)}
  .navitem.active{background:var(--fg);color:var(--bg)}
  .navitem svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex:none}
  .navitem .ct{margin-left:auto;font-family:var(--mono);font-size:11px;opacity:.7}
  .sb-bottom{padding:14px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
  .sb-bottom .lbl{font-size:12px;color:var(--fg-3)}
  .main{min-width:0}
  .main-in{max-width:860px;margin:0 auto;padding:26px 32px 80px}
  @media(max-width:860px){
    .shell{grid-template-columns:1fr}
    .sidebar{position:static;height:auto}
    .sb-nav{display:flex;gap:6px;overflow-x:auto;padding:10px 12px}
    .navitem{flex:0 0 auto;white-space:nowrap}.navitem .ct{display:none}
    .main-in{padding:22px 18px 70px}
  }

  /* goal bar */
  .goalbar{display:flex;align-items:center;gap:10px;border:1px solid var(--border);border-radius:10px;background:var(--bg-2);padding:11px 14px;margin-bottom:24px;cursor:pointer;transition:border-color .2s var(--ease)}
  .goalbar:hover{border-color:var(--border-2)}
  .goalbar .gt{font-family:var(--mono);font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.04em;flex:none}
  .goalbar .gg{font-size:13.5px;color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .goalbar .ge{font-size:12px;color:var(--fg-3);flex:none}

  .vhead{margin-bottom:8px}
  .vkicker{font-family:var(--mono);font-size:12px;color:var(--fg-3);letter-spacing:.04em;text-transform:uppercase}
  .vtitle{font-size:29px;font-weight:600;letter-spacing:-.03em;margin-top:7px;line-height:1.08}
  .vsub{font-size:15px;color:var(--fg-2);margin-top:12px;line-height:1.55;max-width:62ch}

  /* stepper */
  .stepper{display:flex;overflow-x:auto;scrollbar-width:none;margin:24px 0 8px;border:1px solid var(--border);border-radius:10px;padding:6px}
  .stepper::-webkit-scrollbar{display:none}
  .step{flex:1 0 auto;display:flex;align-items:center;gap:8px;padding:9px 13px;border:none;background:none;border-radius:7px;cursor:pointer;font-size:13px;color:var(--fg-2);transition:all .18s var(--ease);white-space:nowrap}
  .step:hover{background:var(--hover);color:var(--fg)}
  .step.active{background:var(--fg);color:var(--bg)}
  .step .sd{width:8px;height:8px;border-radius:50%;background:currentColor;opacity:.4}
  .step.has .sd{opacity:1;background:var(--green)}
  .step.active .sd{opacity:1;background:var(--bg)}

  .compare{border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;background:var(--bg-2);padding:14px 16px;margin:22px 0 6px;font-size:13.5px;color:var(--fg-2);line-height:1.55}
  .compare b{color:var(--fg);font-weight:600}
  .compare .ch{font-family:var(--mono);font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:7px}

  .area{margin-top:26px}
  .area-h{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .area-lbl{font-size:14px;font-weight:600;letter-spacing:-.01em}
  .area-ct{font-family:var(--mono);font-size:11px;color:var(--fg-3);border:1px solid var(--border);border-radius:5px;padding:1px 6px}
  .area-line{flex:1;height:1px;background:var(--border)}
  .toollist{display:flex;flex-direction:column;gap:9px}
  .tool{border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;gap:14px;align-items:flex-start;transition:border-color .2s var(--ease)}
  .tool:hover{border-color:var(--border-2)}
  .tool.chosen{border-color:var(--green);background:var(--green-bg)}
  .tool .tinfo{flex:1;min-width:0}
  .tool .tn{font-size:15px;font-weight:600;letter-spacing:-.015em;display:flex;align-items:center;gap:9px}
  .tool .tb{font-size:13px;color:var(--fg-2);margin-top:4px;line-height:1.45}
  .tool .tbest{font-size:11.5px;color:var(--fg-3);margin-top:8px;display:inline-flex;align-items:center;gap:6px;font-family:var(--mono)}
  .tool .tbest .star{color:var(--accent)}
  .choosebtn{flex:none;align-self:center}
  .choosebtn.on{background:var(--green);border-color:var(--green);color:#fff}

  .proceed{display:flex;justify-content:space-between;gap:12px;margin-top:30px;padding-top:24px;border-top:1px solid var(--border);align-items:center}
  .proceed .sel-ct{font-size:13px;color:var(--fg-2)}
  .proceed .sel-ct b{color:var(--fg)}
  .proceed-r{display:flex;gap:10px}

  .group{margin-bottom:26px}
  .group-h{font-family:var(--mono);font-size:12px;color:var(--fg-2);text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .group-h .line{flex:1;height:1px;background:var(--border)}
  .row{border:1px solid var(--border);border-radius:9px;padding:13px 16px;margin-bottom:9px}
  .row .rn{font-size:15px;font-weight:550;letter-spacing:-.01em;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .row .rb{font-size:13px;color:var(--fg-2);margin-top:4px;line-height:1.45}
  .areatag{font-family:var(--mono);font-size:10.5px;color:var(--fg-3);border:1px solid var(--border);border-radius:5px;padding:1px 6px;white-space:nowrap}
  .why{margin-top:11px}
  .why label{font-size:11px;color:var(--fg-3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em}
  .why textarea{width:100%;margin-top:6px;font-size:13.5px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg-2);color:var(--fg);resize:vertical;min-height:50px;line-height:1.5;transition:all .2s var(--ease)}
  .why textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 22%,transparent);background:var(--bg)}

  .empty{border:1px dashed var(--border-2);border-radius:10px;padding:34px 24px;text-align:center;color:var(--fg-2);background:var(--bg-2)}
  .empty .et{font-size:15px;font-weight:550;color:var(--fg)}
  .empty .ed{font-size:13.5px;margin-top:7px;line-height:1.5}
  .empty .btn{margin-top:16px}

  /* goal view */
  .goal-edit textarea{width:100%;font-size:17px;line-height:1.6;padding:18px 20px;border:1px solid var(--border);border-radius:12px;background:var(--bg-2);color:var(--fg);resize:vertical;min-height:120px;transition:all .2s var(--ease)}
  .goal-edit textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 22%,transparent);background:var(--bg)}
  .ghist{border-left:2px solid var(--border);padding-left:18px;margin-left:4px}
  .grev{padding:12px 0;position:relative}
  .grev::before{content:"";position:absolute;left:-23px;top:16px;width:9px;height:9px;border-radius:50%;background:var(--border-2);border:2px solid var(--bg)}
  .grev.cur::before{background:var(--accent)}
  .grev .gtext{font-size:14px;line-height:1.55}
  .grev .gmeta{font-family:var(--mono);font-size:11.5px;color:var(--fg-3);margin-top:5px}
  .grev.cur .gmeta{color:var(--accent)}

  /* docs */
  .doc-sec{border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:18px}
  .doc-sec .dsh{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px}
  .doc-sec .dst{font-size:16px;font-weight:600;letter-spacing:-.015em}
  .doc-sec .dsd{font-size:12.5px;color:var(--fg-3);margin-bottom:14px}
  .doc-sec textarea{width:100%;font-size:14px;padding:13px 15px;border:1px solid var(--border);border-radius:9px;background:var(--bg-2);color:var(--fg);resize:vertical;min-height:110px;line-height:1.6;transition:all .2s var(--ease)}
  .doc-sec textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 22%,transparent);background:var(--bg)}
  .disc-add{display:flex;gap:9px;margin-bottom:14px}
  .disc-add input{flex:1;font-size:14px;padding:11px 13px;border:1px solid var(--border);border-radius:9px;background:var(--bg-2);color:var(--fg)}
  .disc-add input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 22%,transparent);background:var(--bg)}
  .note{border:1px solid var(--border);border-radius:9px;padding:12px 14px;margin-bottom:8px;background:var(--bg-2)}
  .note .nt{font-size:14px;line-height:1.5}
  .note .nm{font-family:var(--mono);font-size:11px;color:var(--fg-3);margin-top:6px}

  /* environments + preview */
  .env-layout{display:grid;grid-template-columns:288px 1fr;gap:22px;margin-top:24px}
  @media(max-width:780px){.env-layout{grid-template-columns:1fr}}
  .env-col .ecol-h{font-family:var(--mono);font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
  .envcard{border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:11px;cursor:pointer;transition:all .2s var(--ease)}
  .envcard:hover{border-color:var(--border-2)}
  .envcard.active{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 18%,transparent)}
  .envcard .ec-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .envcard .ec-name{font-size:14.5px;font-weight:600;display:flex;align-items:center;gap:8px}
  .envcard .ec-dot{width:8px;height:8px;border-radius:50%}
  .envcard .ec-url{font-family:var(--mono);font-size:11.5px;color:var(--fg-2);margin-top:9px;word-break:break-all}
  .envcard .ec-meta{font-size:11.5px;color:var(--fg-3);margin-top:7px}
  .envcard .ec-act{margin-top:11px;display:flex;gap:8px}
  .stpill{font-size:11px;font-weight:500;padding:2px 9px;border-radius:99px;font-family:var(--mono)}
  .stpill.live{background:var(--green-bg);color:var(--green)}
  .stpill.run{background:var(--amber-bg);color:var(--amber)}
  .stpill.idle{background:var(--hover);color:var(--fg-3)}

  .browser{border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--bg);box-shadow:var(--shadow)}
  .bchrome{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--border);background:var(--bg-2)}
  .bdots{display:flex;gap:6px}
  .bdots span{width:11px;height:11px;border-radius:50%;background:var(--border-2)}
  .burl{flex:1;font-family:var(--mono);font-size:12px;color:var(--fg-2);background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:6px 12px;display:flex;align-items:center;gap:8px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .burl svg{width:11px;height:11px;fill:none;stroke:var(--fg-3);stroke-width:2;flex:none}
  .brefresh{width:28px;height:28px;border-radius:7px;border:none;background:none;cursor:pointer;display:grid;place-items:center}
  .brefresh:hover{background:var(--hover)}
  .brefresh svg{width:14px;height:14px;fill:none;stroke:var(--fg-2);stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
  .bviewport{position:relative;min-height:330px;display:grid;place-items:center;padding:46px 28px;text-align:center;overflow:hidden}
  .env-ribbon{position:absolute;top:14px;left:14px;font-family:var(--mono);font-size:10.5px;font-weight:500;padding:3px 10px;border-radius:99px;letter-spacing:.03em}
  .pv-hero h1{font-size:clamp(26px,4vw,38px);font-weight:600;letter-spacing:-.03em;line-height:1.08}
  .pv-hero p{font-size:15px;color:var(--fg-2);margin:13px auto 0;max-width:42ch;line-height:1.55}
  .pv-built{margin-top:20px;display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
  .pv-chip{font-family:var(--mono);font-size:11px;color:var(--fg-2);border:1px solid var(--border);border-radius:99px;padding:3px 11px;background:var(--bg-2)}
  .pv-cta{margin-top:24px;background:var(--fg);color:var(--bg);border:none;border-radius:8px;padding:11px 22px;font-size:14px;font-weight:500;cursor:default}
  .pv-faint{font-family:var(--mono);font-size:12px;color:var(--fg-3);margin-top:18px}

  /* versions */
  .vsave{display:flex;gap:9px;margin-bottom:22px}
  .vsave input{flex:1;font-size:14px;padding:11px 13px;border:1px solid var(--border);border-radius:9px;background:var(--bg-2);color:var(--fg)}
  .vsave input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 22%,transparent);background:var(--bg)}
  .vitem{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--border)}
  .vitem:last-child{border-bottom:none}
  .vdot{width:11px;height:11px;border-radius:50%;border:2px solid var(--accent);background:var(--bg);flex:none}
  .vitem.first .vdot{background:var(--accent)}
  .vmid{flex:1;min-width:0}
  .vlabel{font-size:14px;font-weight:500;letter-spacing:-.01em}
  .vmeta{font-family:var(--mono);font-size:11.5px;color:var(--fg-3);margin-top:2px}
  .vview{font-size:12.5px;color:var(--accent);cursor:pointer;background:none;border:none;font-weight:500}
  .vview:hover{text-decoration:underline}

  /* overview */
  .ov{border:1px solid var(--border);border-radius:14px;padding:38px 42px;background:var(--bg)}
  @media(max-width:560px){.ov{padding:26px 20px}}
  .ov h1{font-size:30px;font-weight:600;letter-spacing:-.03em;line-height:1.1}
  .ov .ovgoal{font-size:16.5px;color:var(--fg);margin-top:12px;line-height:1.5}
  .ov .ovmeta{font-family:var(--mono);font-size:12px;color:var(--fg-3);margin-top:14px;display:flex;gap:8px;flex-wrap:wrap}
  .ov .ovmeta .dotx{opacity:.5}
  .ov h2{font-size:13px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em;color:var(--fg-3);margin:32px 0 14px;padding-top:22px;border-top:1px solid var(--border)}
  .ov .stackrow{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--border-2)}
  .ov .stackrow:last-child{border-bottom:none}
  .ov .sst{font-family:var(--mono);font-size:12px;color:var(--fg-3);width:130px;flex:none;padding-top:2px}
  .ov .sstool{flex:1}
  .ov .ssn{font-size:15px;font-weight:600}
  .ov .ssn .areax{font-family:var(--mono);font-size:11px;color:var(--fg-3);font-weight:400;margin-left:8px}
  .ov .ssw{font-size:13.5px;color:var(--fg-2);margin-top:3px;line-height:1.5}

  @media(max-width:820px){.ac-panel,.ac-stencils{position:static;width:auto;max-height:none;box-shadow:none;margin-bottom:12px}.ac-undoredo{left:auto;right:14px}}

  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition-duration:.001s!important}}

<div id="start">
  <div class="start-card">

</div>

    {name:"Plan",tag:"Decide what to build and why.",compare:"Solo or a small team → Linear or Notion. A big org with formal process → Jira. Want planning beside your code → GitHub Projects.",

  var DEV_IDX=2, DEPLOY_IDX=4;

  /* state */
  var P=null, view="build", buildStage=0;

  function startProject(name,goal){
    P={name:name,createdAt:new Date().toLocaleDateString([], {year:"numeric",month:"short",day:"numeric"}),
       goal:goal||"(goal not set yet)", goalHistory:[{text:goal||"(goal not set yet)",at:clock(),label:"Initial goal"}],
       selections:[],docs:{plan:"",arch:{elements:[],view:{x:0,y:0,zoom:1}}},discussion:[],versions:[],
       envs:[{id:"dev",name:"Development",status:"run",note:"Local dev server"},
             {id:"preview",name:"Preview",status:"idle",note:"Per-branch preview deploys"},
             {id:"prod",name:"Production",status:"idle",note:"The live site"}],
       activeEnv:"dev"};
    addVersion("Project created",true);
    buildStage=0;view="build";
    document.getElementById("start").style.display="none";
    document.getElementById("app").style.display="block";
    renderSidebar();render();
  }
  function addVersion(label,silent){P.versions.unshift({id:uid(),label:label,at:clock(),snap:JSON.parse(JSON.stringify(P.selections))});if(!silent)toast("✓ Version saved");}
  function selForStage(i){return P.selections.filter(function(s){return s.stageIdx===i;});}
  function isChosen(i,area,tool){return P.selections.some(function(s){return s.stageIdx===i&&s.area===area&&s.tool===tool;});}
  function stagesChosen(){var set={};P.selections.forEach(function(s){set[s.stageIdx]=1;});return Object.keys(set).length;}
  function toggleTool(i,area,tool,brief){
    if(isChosen(i,area,tool)){P.selections=P.selections.filter(function(s){return !(s.stageIdx===i&&s.area===area&&s.tool===tool);});addVersion("Removed "+tool+" · "+STAGES[i].name,true);toast("Removed "+tool);}
    else{P.selections.push({id:uid(),stageIdx:i,stageName:STAGES[i].name,area:area,tool:tool,brief:brief,why:"",at:clock()});addVersion("Chose "+tool+" · "+STAGES[i].name+" / "+area,true);toast("✓ Added "+tool);}
    renderSidebar();render();
  }
  function pick(stageIdx,areaLabel,kind){var s=P.selections.filter(function(x){return x.stageIdx===stageIdx&&x.area===areaLabel;});return s.length?s[0].tool:null;}
  function slug(){return (P.name||"my-app").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")||"my-app";}
  function deployTarget(){
    var host=pick(DEPLOY_IDX,"Hosting");
    var map={"Vercel":"vercel.app","Netlify":"netlify.app","Cloudflare":"pages.dev","Render":"onrender.com","Railway":"up.railway.app","AWS":"amazonaws.com"};
    return {name:host,domain:host?(map[host]||"app"):"app"};
  }
  function envUrl(id){var t=deployTarget(),s=slug();if(id==="dev")return "localhost:3000";if(id==="preview")return s+"-git-main."+t.domain;return s+"."+t.domain;}

  /* sidebar */
  function renderSidebar(){
    document.getElementById("sbName").textContent=P.name;
    document.getElementById("sbGoal").textContent=P.goal;
    var sc=stagesChosen();
    document.getElementById("sbBar").style.width=Math.round(sc/STAGES.length*100)+"%";
    document.getElementById("sbPt").textContent=sc+"/"+STAGES.length;
    document.getElementById("ctStack").textContent=P.selections.length||"";
    document.getElementById("ctDec").textContent=P.selections.length||"";
    document.getElementById("ctVer").textContent=P.versions.length||"";
    document.getElementById("ctBuild").textContent=sc+"/"+STAGES.length;
    document.querySelectorAll(".navitem").forEach(function(b){b.classList.toggle("active",b.dataset.v===view);});
  }

  /* render dispatch */
  function render(){
    var m=document.getElementById("main");
    m.classList.toggle("wide",view==="arch");
    var bar=(view!=="goal"&&view!=="overview"&&view!=="arch")?'<div class="goalbar" id="goalBar"><span class="gt">Goal</span><span class="gg">'+esc(P.goal)+'</span><span class="ge">edit ›</span></div>':'';
    var body=view==="goal"?goalView():view==="build"?buildView():view==="stack"?stackView():view==="env"?envView():view==="arch"?archView():view==="decisions"?decisionsView():view==="docs"?docsView():view==="versions"?versionsView():overviewView();
    m.innerHTML=bar+body;
    wireView();
    if(view==="arch")initArch();
    window.scrollTo({top:0,behavior:"auto"});
  }

  function goalView(){
    var revs=P.goalHistory.slice().reverse().map(function(g,i){
      return '<div class="grev'+(i===0?" cur":"")+'"><div class="gtext">'+esc(g.text)+'</div><div class="gmeta">'+(i===0?"Current · ":"")+esc(g.label||"Revision")+' · '+esc(g.at)+'</div></div>';
    }).join("");
    return '<div class="vhead"><div class="vkicker">Goal</div><div class="vtitle">What we\'re building</div><div class="vsub">The north star for the whole project. Set it, then refine it as the project evolves — every change is kept so the thinking stays visible.</div></div>'+
      '<div class="goal-edit" style="margin-top:24px"><textarea id="goalText" placeholder="Describe what you\'re building and for whom…">'+esc(P.goal)+'</textarea><div style="margin-top:12px;display:flex;justify-content:flex-end"><button class="btn btn-primary" id="goalSave">Save goal</button></div></div>'+
      '<div class="group" style="margin-top:30px"><div class="group-h">Goal history<span class="line"></span></div><div class="ghist">'+revs+'</div></div>';
  }

  function buildView(){
    var steps=STAGES.map(function(s,i){var has=selForStage(i).length>0;return '<button class="step'+(i===buildStage?" active":"")+(has?" has":"")+'" data-step="'+i+'"><span class="sd"></span>'+esc(s.name)+'</button>';}).join("");
    var s=STAGES[buildStage], chosen=selForStage(buildStage);
    var areas=s.areas.map(function(a){
      var picked=a.tools.filter(function(t){return isChosen(buildStage,a.label,t.n);}).length;
      var tools=a.tools.map(function(t){
        var on=isChosen(buildStage,a.label,t.n);
        return '<div class="tool'+(on?" chosen":"")+'"><div class="tinfo"><div class="tn">'+esc(t.n)+(on?' <span style="color:var(--green);font-size:11px;font-family:var(--mono)">✓ in stack</span>':'')+'</div><div class="tb">'+esc(t.b)+'</div><div class="tbest"><span class="star">★</span> Best for '+esc(t.best)+'</div></div><button class="btn '+(on?"choosebtn on":"btn-out choosebtn")+'" data-area="'+esc(a.label)+'" data-pick="'+esc(t.n)+'">'+(on?"Chosen":"Choose")+'</button></div>';
      }).join("");
      return '<div class="area"><div class="area-h"><span class="area-lbl">'+esc(a.label)+'</span><span class="area-ct">'+picked+'/'+a.tools.length+'</span><span class="area-line"></span></div><div class="toollist">'+tools+'</div></div>';
    }).join("");
    var nextName=buildStage<STAGES.length-1?STAGES[buildStage+1].name:null;
    var prevBtn=buildStage>0?'<button class="btn btn-out" data-step="'+(buildStage-1)+'">← '+esc(STAGES[buildStage-1].name)+'</button>':'';
    var nextBtn=nextName?'<button class="btn btn-primary" data-step="'+(buildStage+1)+'">Proceed to '+esc(nextName)+' →</button>':'<button class="btn btn-primary" data-go="overview">Finish · view Overview →</button>';
    return '<div class="vhead"><div class="vkicker">Build · Stage '+(buildStage+1)+' of '+STAGES.length+'</div><div class="vtitle">'+esc(s.name)+'</div><div class="vsub">'+esc(s.tag)+'</div></div>'+
      '<div class="stepper">'+steps+'</div>'+
      '<div class="compare"><span class="ch">How to choose</span>'+esc(s.compare)+'</div>'+
      areas+
      '<div class="proceed"><div class="sel-ct"><b>'+chosen.length+'</b> chosen in '+esc(s.name)+'</div><div class="proceed-r">'+prevBtn+nextBtn+'</div></div>';
  }

  function stackView(){
    if(!P.selections.length)return emptyState("No tools chosen yet","Head to Build and pick the tools for each stage and area. They assemble into your stack here.","Go to Build","build");
    var html='<div class="vhead"><div class="vkicker">Your stack</div><div class="vtitle">The tools, in one place</div><div class="vsub">Everything chosen across the lifecycle, grouped by stage and area — the integrated picture of how the project is built.</div></div>';
    STAGES.forEach(function(s,i){
      var items=selForStage(i);if(!items.length)return;
      html+='<div class="group"><div class="group-h">'+esc(s.name)+'<span class="line"></span></div>';
      items.forEach(function(it){html+='<div class="row"><div class="rn">'+esc(it.tool)+'<span class="areatag">'+esc(it.area)+'</span></div><div class="rb">'+esc(it.brief)+'</div>'+(it.why?'<div class="rb" style="margin-top:8px;color:var(--fg)"><b style="font-weight:600">Why:</b> '+esc(it.why)+'</div>':'')+'</div>';});
      html+='</div>';
    });
    return html;
  }

  function envView(){
    var cards=P.envs.map(function(e){
      var dotc=e.status==="live"?"var(--green)":e.status==="run"?"var(--amber)":"var(--fg-3)";
      var pillc=e.status==="live"?"live":e.status==="run"?"run":"idle";
      var pillt=e.status==="live"?"Live":e.status==="run"?"Running":"Not deployed";
      var act="";
      if(e.id!=="dev")act='<div class="ec-act"><button class="btn btn-out btn-sm" data-deploy="'+e.id+'">'+(e.status==="live"?"Redeploy":"Deploy")+'</button></div>';
      return '<div class="envcard'+(P.activeEnv===e.id?" active":"")+'" data-env="'+e.id+'"><div class="ec-top"><span class="ec-name"><span class="ec-dot" style="background:'+dotc+'"></span>'+esc(e.name)+'</span><span class="stpill '+pillc+'">'+pillt+'</span></div><div class="ec-url">'+esc(envUrl(e.id))+'</div><div class="ec-meta">'+esc(e.note)+(deployTarget().name&&e.id!=="dev"?' · via '+esc(deployTarget().name):"")+'</div>'+act+'</div>';
    }).join("");
    return '<div class="vhead"><div class="vkicker">Environments &amp; preview</div><div class="vtitle">Where it runs, and a live look</div><div class="vsub">Your environments on the left, a live preview of the project on the right. Pick an environment to preview it; deploy Preview or Production to take it live.</div></div>'+
      '<div class="env-layout"><div class="env-col"><div class="ecol-h">Environments</div>'+cards+'</div>'+
      '<div class="env-col"><div class="ecol-h">Live preview</div>'+previewHTML()+'</div></div>';
  }
  function previewHTML(){
    var e=P.envs.find(function(x){return x.id===P.activeEnv;})||P.envs[0];
    var ribbonText=e.id==="dev"?"DEVELOPMENT":e.id==="preview"?"PREVIEW":"PRODUCTION";
    var ribbonColor=e.id==="dev"?"background:var(--amber-bg);color:var(--amber)":e.id==="preview"?"background:color-mix(in srgb,var(--accent) 16%,transparent);color:var(--accent)":(e.status==="live"?"background:var(--green-bg);color:var(--green)":"background:var(--hover);color:var(--fg-3)");
    var fe=pick(DEV_IDX,"Frontend"), be=pick(DEV_IDX,"Backend"), db=pick(DEV_IDX,"Database"), host=deployTarget().name;
    var chips=[fe,be,db,host].filter(Boolean).map(function(x){return '<span class="pv-chip">'+esc(x)+'</span>';}).join("");
    var notLive=(e.id!=="dev"&&e.status!=="live");
    var body=notLive
      ? '<div class="pv-hero"><h1 style="color:var(--fg-3)">Not deployed yet</h1><p>Deploy to '+esc(e.name)+' from the left to see it live at this URL.</p></div>'
      : '<div class="pv-hero"><h1>'+esc(P.name)+'</h1><p>'+esc(P.goal)+'</p>'+(chips?'<div class="pv-built">'+chips+'</div>':'')+'<button class="pv-cta">Get started</button>'+(chips?'':'<div class="pv-faint">Choose tools in Build to see your stack here.</div>')+'</div>';
    return '<div class="browser"><div class="bchrome"><div class="bdots"><span></span><span></span><span></span></div><div class="burl"><svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>'+esc(envUrl(e.id))+'</div><button class="brefresh" id="pvRefresh" title="Refresh"><svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 3v6h-6"/></svg></button></div><div class="bviewport"><span class="env-ribbon" style="'+ribbonColor+'">'+ribbonText+'</span>'+body+'</div></div>';
  }

  function decisionsView(){
    if(!P.selections.length)return emptyState("No decisions yet","Every tool you choose is logged here. Add a reason to each so the project explains itself.","Go to Build","build");
    var html='<div class="vhead"><div class="vkicker">Decisions</div><div class="vtitle">What we chose, and why</div><div class="vsub">Each choice with its rationale. Writing <i>why</i> is what lets anyone understand the project later.</div></div>';
    P.selections.slice().reverse().forEach(function(it){
      html+='<div class="row"><div class="rn">'+esc(it.tool)+'<span class="areatag">'+esc(it.stageName)+' · '+esc(it.area)+'</span></div><div class="rb">'+esc(it.brief)+'</div><div class="why"><label>Why this choice?</label><textarea data-why="'+it.id+'" placeholder="e.g. Fastest path to a working backend; we know Postgres; generous free tier.">'+esc(it.why)+'</textarea></div></div>';
    });
    return html;
  }

  function docsView(){
    var disc=P.discussion.length?P.discussion.map(function(n){return '<div class="note"><div class="nt">'+esc(n.text)+'</div><div class="nm">'+esc(n.at)+'</div></div>';}).join(""):'<div style="font-size:13.5px;color:var(--fg-3)">No notes yet. Capture trade-offs, decisions debated, or open questions.</div>';
    return '<div class="vhead"><div class="vkicker">Docs</div><div class="vtitle">Plan &amp; discussion</div><div class="vsub">The living documentation — it appears in the Overview and gets a version save. Architecture has its own canvas in the Architecture tab.</div></div>'+
      '<div class="doc-sec"><div class="dsh"><span class="dst">Plan & milestones</span><button class="btn btn-out btn-sm" data-savedoc="plan">Save</button></div><div class="dsd">The roadmap — what ships when, and in what order.</div><textarea id="docPlan" placeholder="v0.1 — core editor&#10;v0.2 — sync + auth&#10;v1.0 — public launch">'+esc(P.docs.plan)+'</textarea></div>'+
      '<div class="doc-sec"><div class="dsh"><span class="dst">Discussion</span></div><div class="dsd">A running log of decisions debated, trade-offs, and open questions.</div><div class="disc-add"><input id="discInput" placeholder="Add a note or decision…" maxlength="240"><button class="btn btn-primary btn-sm" id="discAdd">Add</button></div>'+disc+'</div>';
  }

  function versionsView(){
    var items=P.versions.map(function(v,i){return '<div class="vitem'+(i===0?" first":"")+'"><div class="vdot"></div><div class="vmid"><div class="vlabel">'+esc(v.label)+'</div><div class="vmeta">'+esc(v.at)+' · '+v.snap.length+' tool'+(v.snap.length===1?"":"s")+' in stack</div></div><button class="vview" data-vv="'+v.id+'">View snapshot</button></div>';}).join("");
    return '<div class="vhead"><div class="vkicker">Versions</div><div class="vtitle">Every change, saved</div><div class="vsub">A save is recorded each time you choose a tool, edit a doc, change the goal, or deploy. Add your own checkpoints too.</div></div>'+
      '<div class="vsave"><input id="vLabel" placeholder="Name a checkpoint…" maxlength="80"><button class="btn btn-primary" id="vSave">Save version</button></div><div>'+items+'</div>';
  }

  function overviewView(){
    var sc=stagesChosen();
    var stackRows=STAGES.map(function(s,i){
      var items=selForStage(i);if(!items.length)return"";
      var inner=items.map(function(it){return '<div style="margin-bottom:9px"><div class="ssn">'+esc(it.tool)+'<span class="areax">'+esc(it.area)+'</span></div><div class="ssw'+(it.why?'':' muted')+'">'+(it.why?esc(it.why):"No rationale recorded yet")+'</div></div>';}).join("");
      return '<div class="stackrow"><div class="sst">'+esc(s.name)+'</div><div class="sstool">'+inner+'</div></div>';
    }).join("");
    var decisions=P.selections.length?P.selections.map(function(it){return '<li><b>'+esc(it.tool)+'</b> for '+esc(it.stageName)+' / '+esc(it.area)+(it.why?' — '+esc(it.why):"")+'</li>';}).join(""):'<li style="color:var(--fg-3)">No decisions recorded yet.</li>';
    var envs=P.envs.map(function(e){var st=e.status==="live"?"Live":e.status==="run"?"Running":"Not deployed";return '<li><b>'+esc(e.name)+'</b> — '+st+' · <span class="mono" style="font-size:13px;color:var(--fg-3)">'+esc(envUrl(e.id))+'</span></li>';}).join("");
    var arch=archOverviewSVG();
    var plan=P.docs.plan?'<div class="doctext">'+esc(P.docs.plan)+'</div>':'<div class="doctext empty-t">Not documented yet.</div>';
    var disc=P.discussion.length?'<ul>'+P.discussion.map(function(n){return '<li>'+esc(n.text)+' <span style="color:var(--fg-3);font-family:var(--mono);font-size:12px">('+esc(n.at)+')</span></li>';}).join("")+'</ul>':'<div class="doctext empty-t">No discussion logged yet.</div>';
    return '<div class="vhead no-print" style="display:flex;align-items:flex-start;justify-content:space-between;gap:14px"><div><div class="vkicker">Overview</div><div class="vtitle">The whole project, end to end</div><div class="vsub">Everything in one readable page — the picture a new teammate gets to understand the project from zero.</div></div><button class="btn btn-out btn-sm" id="printBtn" style="flex:none;margin-top:6px">Print / export</button></div>'+
      '<div class="ov"><h1>'+esc(P.name)+'</h1><div class="ovgoal">'+esc(P.goal)+'</div>'+
      '<div class="ovmeta"><span>Started '+esc(P.createdAt)+'</span><span class="dotx">·</span><span>'+P.selections.length+' tools · '+sc+'/'+STAGES.length+' stages</span><span class="dotx">·</span><span>'+P.selections.filter(function(s){return s.why;}).length+' decisions explained</span><span class="dotx">·</span><span>'+P.goalHistory.length+' goal revisions</span><span class="dotx">·</span><span>'+P.versions.length+' versions</span></div>'+
      '<h2>The stack</h2>'+(stackRows||'<div class="doctext empty-t">No tools chosen yet.</div>')+
      '<h2>Key decisions & rationale</h2><ul>'+decisions+'</ul>'+
      '<h2>Architecture</h2>'+arch+
      '<h2>Plan & milestones</h2>'+plan+
      '<h2>Environments</h2><ul>'+envs+'</ul>'+
      '<h2>Discussion log</h2>'+disc+
      '<h2>Version history</h2><ul>'+P.versions.map(function(v){return '<li><b>'+esc(v.label)+'</b> <span style="color:var(--fg-3);font-family:var(--mono);font-size:12px">('+esc(v.at)+')</span></li>';}).join("")+'</ul></div>';
  }

  function emptyState(t,d,btn,goto){return '<div class="vhead"><div class="vkicker">'+esc(view)+'</div></div><div class="empty"><div class="et">'+esc(t)+'</div><div class="ed">'+esc(d)+'</div><button class="btn btn-primary" data-go="'+goto+'">'+esc(btn)+'</button></div>';}

  /* wiring */
  function wireView(){
    var m=document.getElementById("main");
    var gb=document.getElementById("goalBar");if(gb)gb.addEventListener("click",function(){view="goal";renderSidebar();render();});
    m.querySelectorAll("[data-step]").forEach(function(b){b.addEventListener("click",function(){buildStage=+b.dataset.step;view="build";renderSidebar();render();});});
    m.querySelectorAll("[data-pick]").forEach(function(b){b.addEventListener("click",function(){var area=b.dataset.area;var a=STAGES[buildStage].areas.find(function(x){return x.label===area;});var t=a.tools.find(function(x){return x.n===b.dataset.pick;});toggleTool(buildStage,area,t.n,t.b);});});
    m.querySelectorAll("[data-go]").forEach(function(b){b.addEventListener("click",function(){view=b.dataset.go;renderSidebar();render();});});
    // goal
    var gs=document.getElementById("goalSave");if(gs)gs.addEventListener("click",function(){var ta=document.getElementById("goalText");var nv=ta.value.trim();if(!nv){toast("Goal can't be empty");return;}if(nv!==P.goal){P.goal=nv;P.goalHistory.push({text:nv,at:clock(),label:"Updated goal"});addVersion("Updated goal");}renderSidebar();render();toast("✓ Goal saved");});
    // decisions why
    m.querySelectorAll("[data-why]").forEach(function(ta){ta.addEventListener("blur",function(){var s=P.selections.find(function(x){return x.id===ta.dataset.why;});if(s&&s.why!==ta.value.trim()){s.why=ta.value.trim();}});});

  /* ---- geometry & color helpers ---- */

  function closeCtx(){if(AC&&AC.ctx){AC.ctx.remove();AC.ctx=null;}}
  function showCtx(cx,cy){
    closeCtx();var has=AC.selected.length>0,r=AC.stage.getBoundingClientRect();
    var item=function(a,label,sc,cls){return '<button data-ca="'+a+'"'+(cls?' class="'+cls+'"':'')+'><span>'+label+'</span><span class="sc">'+(sc||'')+'</span></button>';};
    var html='';
    if(has){html+=item("dup","Duplicate","⌘D")+item("front","Bring to front")+item("back","Send to back")+item("copy","Copy","⌘C")+'<div class="sep"></div>'+item("del","Delete","⌫","danger");}
    else{html+=item("paste","Paste","⌘V")+item("all","Select all","⌘A")+item("fit","Fit to view");}
    var m=document.createElement("div");m.className="ac-ctx";m.innerHTML=html;AC.stage.appendChild(m);AC.ctx=m;
    m.style.left=Math.min(cx-r.left,r.width-200)+"px";m.style.top=Math.min(cy-r.top,r.height-240)+"px";
    m.addEventListener("pointerdown",function(ev){ev.stopPropagation();});
    m.addEventListener("click",function(ev){var b=ev.target.closest("button");if(!b)return;var a=b.dataset.ca;closeCtx();ctxAction(a);});
  }
  function ctxAction(a){
    if(a==="dup")duplicateSelection(16,16);else if(a==="front")toFront();else if(a==="back")toBack();
    else if(a==="copy")copySelection();else if(a==="del")deleteSelection();else if(a==="paste")pasteClip();
    else if(a==="all"){AC.selected=AC.els.map(function(x){return x.id;});renderOverlay();renderPanel();togglePanels();}else if(a==="fit")fitView();
  }

  /* ---- save indicator + snapshot ---- */
  function updateSaveTag(){var t=document.getElementById("acSaveTag");if(!t)return;t.innerHTML='<span class="dot'+(AC.dirty?" dirty":"")+'"></span>'+(AC.dirty?"Unsaved snapshot":"Saved to project");}
  function saveSnapshot(){addVersion("Updated architecture");AC.dirty=false;updateSaveTag();renderSidebar();}
  function clearCanvas(){
    if(!AC.els.length){toast("Canvas is already empty");return;}
    openModal('<h3>Clear the canvas?</h3><div class="msub">This removes every shape from the architecture diagram. You can undo it with ⌘Z.</div><div class="modal-foot"><button class="btn btn-out" id="mC">Cancel</button><button class="btn btn-primary" id="mY">Clear</button></div>');
    document.getElementById("mC").addEventListener("click",closeModal);
    document.getElementById("mY").addEventListener("click",function(){closeModal();var before=cloneEls();setEls([]);AC.selected=[];commit(before);renderAll();renderPanel();togglePanels();toast("Canvas cleared");});
  }

  /* ---- wiring ---- */
  function initArch(){
    if(!P.docs.arch)P.docs.arch={elements:[],view:{x:0,y:0,zoom:1}};
    if(!P.docs.arch.view)P.docs.arch.view={x:0,y:0,zoom:1};
    var fresh=P.docs.arch.view.x===0&&P.docs.arch.view.y===0&&P.docs.arch.view.zoom===1;
    AC={stage:document.getElementById("acStage"),svg:document.getElementById("acSvg"),content:document.getElementById("acContent"),overlay:document.getElementById("acOverlay"),
      els:P.docs.arch.elements,view:P.docs.arch.view,tool:"select",selected:[],drag:null,edit:null,editing:null,draft:null,ctx:null,space:false,clip:null,undo:[],redo:[],dirty:false,
      style:{stroke:"ink",fill:"none",sw:2,fillStyle:"hachure",rough:1,font:20,opacity:100,edges:"round"}};
    AC.rc=rough.svg(AC.svg);
    AC.els.forEach(function(e){if(e.seed==null)e.seed=(Math.random()*1e5)|0;});
    // toolbar
    document.querySelectorAll(".ac-tool").forEach(function(b){b.addEventListener("click",function(){setTool(b.dataset.tool);});});
    document.querySelectorAll(".ac-sten").forEach(function(b){b.addEventListener("click",function(){addStencil(b.dataset.sten);});});
    var stenTog=document.getElementById("acStenTog");if(stenTog)stenTog.addEventListener("click",function(){document.getElementById("acStencils").classList.add("hidden");});
    document.getElementById("acFit").addEventListener("click",fitView);
    document.getElementById("acClear").addEventListener("click",clearCanvas);
    document.getElementById("acSnap").addEventListener("click",saveSnapshot);
    document.getElementById("acZoomIn").addEventListener("click",function(){zoomBy(1.2);});
    document.getElementById("acZoomOut").addEventListener("click",function(){zoomBy(1/1.2);});
    document.getElementById("acZoomVal").addEventListener("click",function(){var r=AC.stage.getBoundingClientRect();zoomAt(1,r.width/2,r.height/2);});
    document.getElementById("acUndo").addEventListener("click",undo);
    document.getElementById("acRedo").addEventListener("click",redo);
    // panel delegation
    var panel=document.getElementById("acPanel");
    panel.addEventListener("click",function(e){var b=e.target.closest("[data-sp],[data-act]");if(!b)return;if(b.dataset.act){var a=b.dataset.act;if(a==="front")toFront();else if(a==="back")toBack();else if(a==="dup")duplicateSelection(16,16);else if(a==="del")deleteSelection();return;}var v=b.dataset.val;setStyle(b.dataset.sp,isNaN(+v)?v:+v);});
    panel.addEventListener("input",function(e){var b=e.target.closest("[data-sp]");if(b&&b.dataset.sp==="opacity")setStyle("opacity",+b.value);});
    // stage events
    AC.stage.addEventListener("pointerdown",onDown);
    AC.stage.addEventListener("dblclick",onDbl);
    AC.stage.addEventListener("contextmenu",onCtx);
    AC.stage.addEventListener("wheel",onWheel,{passive:false});
    if(!acKeyBound){document.addEventListener("keydown",acKeydown);document.addEventListener("keyup",acKeyup);window.addEventListener("resize",function(){if(view==="arch"&&AC)renderOverlay();});acKeyBound=true;}
    renderAll();renderPanel();togglePanels();updateUndoButtons();updateSaveTag();
    if(AC.els.length&&fresh)fitView();else applyView();
  }
  function onDbl(e){
    var pt=toCanvas(e.clientX,e.clientY),el=hitTest(pt.x,pt.y);
    if(el){if(el.type==="text"||el.type==="rectangle"||el.type==="ellipse"||el.type==="diamond"){AC.selected=[el.id];openEditor(el,false,cloneEls());}return;}
    startTextNew(pt.x,pt.y,cloneEls());
  }
  function onCtx(e){
    e.preventDefault();var pt=toCanvas(e.clientX,e.clientY),el=hitTest(pt.x,pt.y);
    if(el){if(AC.selected.indexOf(el.id)<0)AC.selected=[el.id];}else AC.selected=[];
    renderOverlay();renderPanel();togglePanels();showCtx(e.clientX,e.clientY);
  }
  function onWheel(e){
    e.preventDefault();
    if(e.ctrlKey||e.metaKey){var r=AC.stage.getBoundingClientRect();zoomAt(AC.view.zoom*Math.pow(0.999,e.deltaY*1.6),e.clientX-r.left,e.clientY-r.top);}
    else{AC.view.x-=e.deltaX;AC.view.y-=e.deltaY;applyView();}
  }
  function acKeydown(e){
    if(view!=="arch"||!AC)return;var tag=(e.target&&e.target.tagName)||"";if(AC.edit||tag==="INPUT"||tag==="TEXTAREA")return;
    var meta=e.metaKey||e.ctrlKey;
    if(meta){var k=e.key.toLowerCase();
      if(k==="z"){e.preventDefault();if(e.shiftKey)redo();else undo();}
      else if(k==="y"){e.preventDefault();redo();}
      else if(k==="d"){e.preventDefault();duplicateSelection(16,16);}
      else if(k==="a"){e.preventDefault();AC.selected=AC.els.map(function(x){return x.id;});renderOverlay();renderPanel();togglePanels();}
      else if(k==="c"){copySelection();}
      else if(k==="x"){copySelection();deleteSelection();}
      else if(k==="v"){pasteClip();}
      else if(k==="0"){e.preventDefault();var r=AC.stage.getBoundingClientRect();zoomAt(1,r.width/2,r.height/2);}
      else if(k==="="||k==="+"){e.preventDefault();zoomBy(1.2);}
      else if(k==="-"){e.preventDefault();zoomBy(1/1.2);}
      return;
    }
    switch(e.key){
      case "v":case "1":setTool("select");break;
      case "h":case "2":setTool("hand");break;
      case "r":setTool("rectangle");break;
      case "d":setTool("diamond");break;
      case "o":setTool("ellipse");break;
      case "a":setTool("arrow");break;
      case "l":setTool("line");break;
      case "p":setTool("draw");break;
      case "t":setTool("text");break;
      case "e":setTool("eraser");break;
      case "Delete":case "Backspace":e.preventDefault();deleteSelection();break;
      case "Escape":closeCtx();AC.selected=[];selectTool();renderOverlay();renderPanel();togglePanels();break;
      case " ":if(!AC.space){AC.space=true;setCursor("grab");}e.preventDefault();break;
      case "ArrowUp":nudge(0,e.shiftKey?-10:-1,e);break;
      case "ArrowDown":nudge(0,e.shiftKey?10:1,e);break;
      case "ArrowLeft":nudge(e.shiftKey?-10:-1,0,e);break;
      case "ArrowRight":nudge(e.shiftKey?10:1,0,e);break;
    }
  }
  function acKeyup(e){if(e.key===" "&&AC){AC.space=false;if(view==="arch"&&!AC.drag)setCursorForTool();}}

  /* ---- static SVG for the Overview ---- */
  function archOverviewSVG(){
    if(!P.docs.arch||!P.docs.arch.elements||!P.docs.arch.elements.length)
      return '<div class="ov-arch" style="display:grid;place-items:center;min-height:180px;color:var(--fg-3);font-family:Kalam,cursive;font-size:17px;text-align:center;padding:24px">No architecture drawn yet — open the Architecture tab to design the system on the canvas.</div>';
    var els=P.docs.arch.elements,b=bboxOf(els),pad=44;
    var svg=document.createElementNS(SVGNS,"svg");
    svg.setAttribute("viewBox",(b.x-pad)+" "+(b.y-pad)+" "+(b.w+pad*2)+" "+(b.h+pad*2));
    svg.setAttribute("width","100%");svg.setAttribute("preserveAspectRatio","xMidYMid meet");
    svg.style.display="block";svg.style.maxHeight="460px";
    var rc=rough.svg(svg);
    els.forEach(function(el){svg.appendChild(buildNode(rc,el,false));});
    return '<div class="ov-arch" style="padding:12px 14px">'+new XMLSerializer().serializeToString(svg)+'</div>';
  }
})();
</script>
</body>
</html>
